<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 Snake Memory Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: radial-gradient(ellipse at top, #0a1f0a 0%, #051005 50%, #0f1a05 100%);
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px 28px;
    overflow-x: hidden;
  }

  .jungle-strip {
    width: 100%;
    max-width: 700px;
    height: 22px;
    background: repeating-linear-gradient(90deg, #1a4a0a 0px, #1a4a0a 20px, #2a6a0a 20px, #2a6a0a 40px);
    border-radius: 6px;
    margin: 6px 0;
    position: relative;
    overflow: hidden;
  }
  .jungle-strip::after {
    content: '🌿🍃🌿🍃🌿🍃🌿🍃🌿🍃🌿🍃🌿🍃🌿🍃';
    position: absolute;
    top: 2px; left: 0;
    font-size: 13px;
    letter-spacing: 2px;
    animation: leafScroll 10s linear infinite;
    white-space: nowrap;
  }
  @keyframes leafScroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  h1 {
    color: #AAFFAA;
    font-size: clamp(1.5rem, 5vw, 2.3rem);
    text-align: center;
    letter-spacing: 3px;
    text-shadow: 0 0 20px #44FF44, 0 0 40px #00AA00;
    margin: 8px 0 4px;
  }

  .subtitle {
    color: #88CC88;
    font-size: 0.9rem;
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-align: center;
  }

  .scorebar {
    display: flex;
    gap: 32px;
    background: rgba(255,255,255,0.06);
    padding: 10px 32px;
    border-radius: 20px;
    border: 1px solid rgba(170,255,170,0.2);
    margin-bottom: 20px;
  }
  .score-item { text-align: center; }
  .score-num { color: #AAFFAA; font-size: 1.6rem; font-weight: bold; }
  .score-match { color: #FFFFAA; font-size: 1.6rem; font-weight: bold; }
  .score-label { color: #aaa; font-size: 0.68rem; letter-spacing: 1px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    max-width: 700px;
    width: 100%;
    padding: 0 6px;
  }

  .card-wrapper {
    perspective: 800px;
    aspect-ratio: 1 / 1.1;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(.4,1.3,.6,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-back, .card-front {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .card-back {
    background: linear-gradient(135deg, #0f2a0f, #0a1a0a, #152a05);
    border: 3px solid #3a7a2a;
    box-shadow: 0 6px 18px rgba(58,122,42,0.35);
    font-size: 3rem;
  }

  .card-front {
    background: linear-gradient(160deg, #0f1f0f, #1a2a0a);
    border: 3px solid #2a4a1a;
    transform: rotateY(180deg);
    padding: 10px 6px 8px;
    gap: 6px;
  }
  .card-front.matched {
    border-color: #AAFFAA;
    box-shadow: 0 0 22px rgba(170,255,170,0.5);
    background: linear-gradient(160deg, #0a2a0a, #154a05);
  }

  .snake-svg {
    width: 80%;
    max-width: 115px;
    display: block;
    margin: 0 auto;
  }

  .snake-name {
    font-size: clamp(0.58rem, 1.7vw, 0.8rem);
    font-weight: bold;
    letter-spacing: 1px;
    color: #77AA77;
    text-align: center;
    text-transform: uppercase;
  }
  .card-front.matched .snake-name { color: #AAFFAA; }
  .match-tick { font-size: 1.2rem; }

  @keyframes slither {
    0%   { transform: rotate(-4deg) translateX(-2px); }
    100% { transform: rotate(4deg)  translateX(2px);  }
  }
  .matched .snake-svg {
    animation: slither 0.5s ease-in-out infinite alternate;
  }

  .new-game-btn {
    margin-top: 22px;
    padding: 14px 40px;
    background: linear-gradient(135deg, #1a4a0a, #0f2a05);
    color: #AAFFAA;
    border: 2px solid #4aaa2a;
    border-radius: 28px;
    font-size: 1.05rem;
    font-family: monospace;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(74,170,42,0.4);
    text-transform: uppercase;
    -webkit-appearance: none;
  }

  .win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .win-overlay.show { display: flex; }

  .win-box {
    background: linear-gradient(135deg, #050f05, #0f1f05);
    border: 4px solid #AAFFAA;
    border-radius: 28px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 0 60px rgba(170,255,170,0.4);
    max-width: 340px;
    width: 90%;
  }
  .win-trophy { font-size: 4rem; margin-bottom: 8px; }
  .win-title { color: #AAFFAA; font-size: 2.2rem; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 20px #AAFFAA; }
  .win-moves { color: #ccffcc; font-size: 1rem; margin: 10px 0 6px; }
  .win-stars { font-size: 2.2rem; margin: 8px 0 16px; }
  .win-snakes { font-size: 2.2rem; margin-bottom: 22px; letter-spacing: 4px; }
  .play-again-btn {
    padding: 15px 38px;
    background: linear-gradient(135deg, #AAFFAA, #44CC44);
    color: #000;
    border: none;
    border-radius: 28px;
    font-size: 1.1rem;
    font-family: monospace;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
    -webkit-appearance: none;
  }
</style>
</head>
<body>

<div class="jungle-strip"></div>

<h1>🐍 Snake Memory! 🐍</h1>
<p class="subtitle">Match the slithery snakes!</p>

<div class="scorebar">
  <div class="score-item">
    <div class="score-num" id="moves-count">0</div>
    <div class="score-label">MOVES</div>
  </div>
  <div class="score-item">
    <div class="score-match" id="match-count">0/6</div>
    <div class="score-label">MATCHED</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<button class="new-game-btn" onclick="initGame()">🔄 New Game!</button>

<div class="jungle-strip" style="margin-top:18px"></div>

<div class="win-overlay" id="win-overlay">
  <div class="win-box">
    <div class="win-trophy">🏆</div>
    <div class="win-title">YOU WIN!</div>
    <div class="win-moves" id="win-moves-text"></div>
    <div class="win-stars" id="win-stars"></div>
    <div class="win-snakes">🐍🐍🐍</div>
    <button class="play-again-btn" onclick="initGame(); document.getElementById('win-overlay').classList.remove('show')">🐍 PLAY AGAIN!</button>
  </div>
</div>

<script>
const SNAKES = [
  { id:1, name:"RED VIPER",      body:"#EE2222", belly:"#FF8888", stripe:"#AA0000", tongue:"#FF0000",  spot:"#CC0000"  },
  { id:2, name:"BLUE COBRA",     body:"#2244EE", belly:"#88AAFF", stripe:"#001199", tongue:"#4466FF",  spot:"#1133CC"  },
  { id:3, name:"GREEN PYTHON",   body:"#22AA33", belly:"#AAFFAA", stripe:"#005500", tongue:"#00FF44",  spot:"#118822"  },
  { id:4, name:"PURPLE BOA",     body:"#9922CC", belly:"#DD99FF", stripe:"#550088", tongue:"#CC44FF",  spot:"#7711AA"  },
  { id:5, name:"ORANGE KING",    body:"#EE7700", belly:"#FFDDAA", stripe:"#994400", tongue:"#FFAA00",  spot:"#CC5500"  },
  { id:6, name:"YELLOW MAMBA",   body:"#CCBB00", belly:"#FFFFAA", stripe:"#887700", tongue:"#FFEE00",  spot:"#AAAA00"  },
];

function snakeSVG(s) {
  return `<svg class="snake-svg" viewBox="0 0 110 140" xmlns="http://www.w3.org/2000/svg">

    <!-- Coiled body - bottom coil -->
    <ellipse cx="55" cy="115" rx="40" ry="16" fill="${s.body}" stroke="${s.stripe}" stroke-width="2.5"/>
    <ellipse cx="55" cy="115" rx="28" ry="9"  fill="${s.belly}" opacity="0.6"/>

    <!-- Middle coil -->
    <ellipse cx="55" cy="95" rx="36" ry="14" fill="${s.body}" stroke="${s.stripe}" stroke-width="2.5"/>
    <!-- Spots / pattern on middle coil -->
    <ellipse cx="38" cy="93" rx="7" ry="5" fill="${s.spot}" opacity="0.7"/>
    <ellipse cx="72" cy="93" rx="7" ry="5" fill="${s.spot}" opacity="0.7"/>
    <ellipse cx="55" cy="97" rx="6" ry="4" fill="${s.spot}" opacity="0.7"/>
    <ellipse cx="55" cy="92" rx="24" ry="7" fill="${s.belly}" opacity="0.5"/>

    <!-- Upper coil -->
    <ellipse cx="55" cy="76" rx="30" ry="12" fill="${s.body}" stroke="${s.stripe}" stroke-width="2.5"/>
    <ellipse cx="40" cy="74" rx="6" ry="4" fill="${s.spot}" opacity="0.7"/>
    <ellipse cx="70" cy="74" rx="6" ry="4" fill="${s.spot}" opacity="0.7"/>
    <ellipse cx="55" cy="77" rx="20" ry="6" fill="${s.belly}" opacity="0.5"/>

    <!-- Neck rising up -->
    <path d="M38,68 Q30,52 35,38 Q38,28 55,24" fill="none" stroke="${s.body}" stroke-width="18" stroke-linecap="round"/>
    <path d="M38,68 Q30,52 35,38 Q38,28 55,24" fill="none" stroke="${s.belly}" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <!-- Neck spots -->
    <circle cx="32" cy="55" r="5" fill="${s.spot}" opacity="0.7"/>
    <circle cx="34" cy="42" r="4" fill="${s.spot}" opacity="0.7"/>

    <!-- HEAD -->
    <ellipse cx="62" cy="20" rx="22" ry="16" fill="${s.body}" stroke="${s.stripe}" stroke-width="2.5"/>
    <!-- Head belly patch -->
    <ellipse cx="62" cy="23" rx="14" ry="9" fill="${s.belly}" opacity="0.7"/>

    <!-- Eyes -->
    <circle cx="54" cy="14" r="6" fill="white" stroke="${s.stripe}" stroke-width="1.5"/>
    <circle cx="72" cy="14" r="6" fill="white" stroke="${s.stripe}" stroke-width="1.5"/>
    <circle cx="55" cy="15" r="3.5" fill="#111"/>
    <circle cx="73" cy="15" r="3.5" fill="#111"/>
    <!-- Eye shine -->
    <circle cx="54" cy="13" r="1.5" fill="white"/>
    <circle cx="72" cy="13" r="1.5" fill="white"/>

    <!-- Nostrils -->
    <circle cx="58" cy="22" r="1.5" fill="${s.stripe}"/>
    <circle cx="66" cy="22" r="1.5" fill="${s.stripe}"/>

    <!-- Forked tongue -->
    <line x1="63" y1="34" x2="63" y2="46" stroke="${s.tongue}" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="63" y1="46" x2="57" y2="54" stroke="${s.tongue}" stroke-width="2"   stroke-linecap="round"/>
    <line x1="63" y1="46" x2="69" y2="54" stroke="${s.tongue}" stroke-width="2"   stroke-linecap="round"/>

    <!-- Tail tip peeking out -->
    <path d="M88,113 Q100,110 102,118 Q100,126 92,122" fill="${s.body}" stroke="${s.stripe}" stroke-width="2"/>
  </svg>`;
}

let flipped = [], matched = [], moves = 0, locked = false, cards = [];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function initGame() {
  flipped = []; matched = []; moves = 0; locked = false;
  cards = shuffle([...SNAKES, ...SNAKES].map((s, i) => ({ uid:`${s.id}-${i}`, snake:s })));
  document.getElementById('moves-count').textContent = '0';
  document.getElementById('match-count').textContent = `0/${SNAKES.length}`;
  document.getElementById('win-overlay').classList.remove('show');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards.forEach((card, i) => {
    const isFlipped = flipped.includes(i) || matched.includes(card.snake.id);
    const isMatched  = matched.includes(card.snake.id);
    const wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';
    wrapper.innerHTML = `<div class="card-inner ${isFlipped ? 'flipped' : ''}" id="card-${i}">
      <div class="card-back">🌿</div>
      <div class="card-front ${isMatched ? 'matched' : ''}">
        ${snakeSVG(card.snake)}
        <div class="snake-name">${card.snake.name}</div>
        ${isMatched ? '<div class="match-tick">✅</div>' : ''}
      </div>
    </div>`;
    wrapper.addEventListener('click', () => handleClick(i));
    grid.appendChild(wrapper);
  });
}

function handleClick(i) {
  if (locked || flipped.includes(i) || matched.includes(cards[i].snake.id)) return;
  if (flipped.length === 2) return;

  flipped.push(i);
  document.getElementById(`card-${i}`).classList.add('flipped');

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves-count').textContent = moves;
    const [a, b] = flipped;

    if (cards[a].snake.id === cards[b].snake.id) {
      matched.push(cards[a].snake.id);
      document.getElementById('match-count').textContent = `${matched.length}/${SNAKES.length}`;
      [a, b].forEach(idx => {
        const front = document.querySelector(`#card-${idx} .card-front`);
        if (front) {
          front.classList.add('matched');
          front.innerHTML = snakeSVG(cards[idx].snake) + `<div class="snake-name">${cards[idx].snake.name}</div><div class="match-tick">✅</div>`;
        }
      });
      flipped = [];
      if (matched.length === SNAKES.length) setTimeout(showWin, 700);
    } else {
      locked = true;
      setTimeout(() => {
        flipped.forEach(idx => document.getElementById(`card-${idx}`).classList.remove('flipped'));
        flipped = [];
        locked = false;
      }, 1200);
    }
  }
}

function showWin() {
  const stars = moves <= 8 ? 3 : moves <= 13 ? 2 : 1;
  document.getElementById('win-moves-text').textContent = `Finished in ${moves} moves!`;
  document.getElementById('win-stars').textContent = '⭐'.repeat(stars) + '🌑'.repeat(3 - stars);
  document.getElementById('win-overlay').classList.add('show');
}

initGame();
</script>
</body>
</html>
