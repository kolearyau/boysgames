<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lachie's Animal Cards!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    min-height: 100vh;
    background: #fff9f0;
    background-image: radial-gradient(circle at 20% 20%, #ffe0b2 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, #c8e6c9 0%, transparent 50%),
                      radial-gradient(circle at 50% 50%, #bbdefb 0%, transparent 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    overflow: hidden;
    user-select: none;
  }

  h1 {
    font-size: clamp(1.5rem, 5vw, 2.8rem);
    color: #ff6b35;
    text-shadow: 3px 3px 0 #ffcc02, 5px 5px 0 rgba(0,0,0,0.1);
    margin-bottom: 6px;
    letter-spacing: 1px;
    text-align: center;
    padding: 0 12px;
  }

  .subtitle {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(0.85rem, 2.8vw, 1.2rem);
    color: #7c6f64;
    margin-bottom: 18px;
    font-weight: 700;
  }

  .card-scene {
    width: min(310px, 78vw);
    height: min(390px, 60vh);
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 20px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 28px;
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.1);
  }

  .card-back {
    background: linear-gradient(135deg, #ff6b35, #ff8c42);
    border: 6px solid #fff;
  }

  .card-back-pattern {
    width: 100%;
    height: 100%;
    border-radius: 22px;
    background-image: radial-gradient(circle, rgba(255,255,255,0.15) 2px, transparent 2px);
    background-size: 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .card-back-icon {
    font-size: clamp(5rem, 15vw, 8rem);
    animation: wiggle 2s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
  }

  .tap-hint {
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    color: rgba(255,255,255,0.95);
    text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
    letter-spacing: 1px;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-5deg) scale(1); }
    50% { transform: rotate(5deg) scale(1.05); }
  }

  .card-front {
    background: white;
    border: 6px solid #ffcc02;
    transform: rotateY(180deg);
    flex-direction: column;
    gap: 8px;
    padding: 14px;
  }

  .animal-bg {
    width: 100%;
    flex: 1;
    border-radius: 18px;
    background: #fff9e0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .animal-svg {
    width: 94%;
    height: 94%;
    max-width: 260px;
  }

  .animal-name {
    font-size: clamp(2rem, 7vw, 3rem);
    color: #ff6b35;
    text-align: center;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }

  .sound-btn {
    background: #ff6b35;
    border: none;
    border-radius: 60px;
    padding: 15px 32px;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 4.5vw, 1.8rem);
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.15), 0 8px 20px rgba(0,0,0,0.1);
    transition: transform 0.1s, box-shadow 0.1s;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.5px;
  }

  .sound-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.15);
  }

  .sound-btn.hidden { visibility: hidden; }

  .next-btn {
    background: white;
    border: 4px solid #ff6b35;
    border-radius: 60px;
    padding: 12px 26px;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1rem, 3.8vw, 1.4rem);
    color: #ff6b35;
    cursor: pointer;
    box-shadow: 0 5px 0 #ff6b35;
    transition: transform 0.1s, box-shadow 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .next-btn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #ff6b35;
  }

  .buttons-row {
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .burst {
    position: fixed;
    pointer-events: none;
    font-size: 2.5rem;
    animation: burst-out 1.2s ease-out forwards;
    z-index: 100;
  }

  @keyframes burst-out {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    100% { transform: scale(2.5) rotate(360deg) translateY(-80px); opacity: 0; }
  }
</style>
</head>
<body>

<h1>🐾 Lachie's Animal Cards!</h1>
<p class="subtitle">Tap the card to see who's hiding!</p>

<div class="card-scene" id="cardScene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="card-face card-back">
      <div class="card-back-pattern">
        <div class="card-back-icon">🃏</div>
        <div class="tap-hint">TAP ME!</div>
      </div>
    </div>
    <div class="card-face card-front" id="cardFront">
      <div class="animal-bg" id="animalBg">
        <svg class="animal-svg" id="animalSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="animal-name" id="animalName"></div>
    </div>
  </div>
</div>

<div class="buttons-row">
  <button class="sound-btn hidden" id="soundBtn" onclick="playSound()">🔊 Say it!</button>
  <button class="next-btn" id="nextBtn" onclick="nextCard()">Next ➜</button>
</div>

let currentIndex = 0;
let isFlipped = false;
let shuffled = shuffle(animals);

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadAnimal(animal) {
  document.getElementById('cardFront').style.borderColor = animal.color;
  document.getElementById('animalBg').style.background = animal.bg;
  document.getElementById('animalName').style.color = animal.color;
  document.getElementById('animalName').textContent = animal.name;
  document.getElementById('soundBtn').style.background = animal.color;
  animal.draw(document.getElementById('animalSvg'));
}

function sayName(name) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(name);
  u.rate = 0.78;
  u.pitch = 1.25;
  u.volume = 1;
  window.speechSynthesis.speak(u);
}

function flipCard() {
  if (isFlipped) return;
  isFlipped = true;
  document.getElementById('card').classList.add('flipped');
  loadAnimal(shuffled[currentIndex]);
  document.getElementById('soundBtn').classList.remove('hidden');
  spawnBurst();
  setTimeout(() => sayName(shuffled[currentIndex].name), 700);
}

function spawnBurst() {
  const emojis = ['⭐','🌟','✨','🎉','💫','🌈'];
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'burst';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (15 + Math.random() * 70) + 'vw';
      el.style.top = (15 + Math.random() * 55) + 'vh';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }, i * 120);
  }
}

function nextCard() {
  currentIndex = (currentIndex + 1) % shuffled.length;
  if (currentIndex === 0) shuffled = shuffle(animals);
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('soundBtn').classList.add('hidden');
  window.speechSynthesis.cancel();
}

function playSound() {
  sayName(shuffled[currentIndex].name);
  const btn = document.getElementById('soundBtn');
  btn.style.transform = 'scale(1.15)';
  setTimeout(() => btn.style.transform = '', 200);
}
